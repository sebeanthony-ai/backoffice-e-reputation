# Render Blueprint : backend Node + disque persistant SQLite/uploads.
# Déploie automatiquement depuis GitHub à chaque push sur `main`.
services:
  - type: web
    name: backoffice-e-reputation-api
    runtime: node
    region: frankfurt
    plan: starter # 7 $/mois — nécessaire pour le disque persistant
    rootDir: backend
    # @sparticuz/chromium embarque Chromium dans node_modules (~50MB), pas
    # besoin de puppeteer browsers install ni de PUPPETEER_CACHE_DIR.
    # On désactive le download du Chrome standard de Puppeteer (gain de
    # ~120MB de build et plus de fragilité de cache).
    buildCommand: PUPPETEER_SKIP_DOWNLOAD=true npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: JWT_SECRET
        generateValue: true # Render génère une clé aléatoire sécurisée au premier deploy
      - key: ADMIN_EMAIL
        sync: false # À renseigner dans le dashboard Render
      - key: ADMIN_PASSWORD
        sync: false # À renseigner dans le dashboard Render
      - key: ADMIN_NAME
        value: "Admin"
      - key: CORS_ORIGINS
        sync: false # URL Vercel, à compléter après déploiement du front
    disk:
      name: bo-data
      mountPath: /data
      sizeGB: 1
