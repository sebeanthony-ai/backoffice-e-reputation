# Render Blueprint : backend Node + disque persistant SQLite/uploads.
# Déploie automatiquement depuis GitHub à chaque push sur `main`.
services:
  - type: web
    name: backoffice-e-reputation-api
    runtime: node
    region: frankfurt
    plan: starter # 7 $/mois — nécessaire pour le disque persistant
    rootDir: backend
    # Installe les deps + force le téléchargement de Chromium dans un cache persistant.
    # Sans `puppeteer browsers install chrome`, Render purge le cache par défaut entre
    # les builds et Puppeteer crashe avec « Could not find Chrome » au runtime.
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      # Cache Puppeteer dans le dossier projet (persistant entre builds Render).
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: JWT_SECRET
        generateValue: true # Render génère une clé aléatoire sécurisée au premier deploy
      - key: ADMIN_EMAIL
        sync: false # À renseigner dans le dashboard Render
      - key: ADMIN_PASSWORD
        sync: false # À renseigner dans le dashboard Render
      - key: ADMIN_NAME
        value: "Admin"
      - key: CORS_ORIGINS
        sync: false # URL Vercel, à compléter après déploiement du front
    disk:
      name: bo-data
      mountPath: /data
      sizeGB: 1
